<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - AI Intern</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="images/png" href="images/favicon.png">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="nav-container">
            <h1 class="logo">AI Intern</h1>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="internship-categories.html">Internship Categories</a>
                <a href="internship-finder.html">Internship Finder</a>
                <a href="skill-pathway.html">Skill Pathway</a>
                <a href="success-stories.html">Success Stories</a>
                <a href="contact.html" class="active">Contact</a>
            </nav>
        </div>
    </header>

  <!-- Contact Section -->
  <section class="section">
    <div class="contact-container">

      <div class="flex-1">
        <h2 class="subtitle">Contact Us</h2>
        <p class="desc">
          Have a question, suggestion, or feedback? We'd love to hear from you!
          Fill out the form below and we'll get back to you as soon as possible.
        </p>

        <div class="form-box">

          <form action="https://formsubmit.co/aiinternforms@gmail.com" method="POST">

            <!-- FormSubmit Settings -->
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="New AI Intern Contact Form Submission">
            <input type="hidden" name="_template" value="table">

            <input type="text" name="Name" placeholder="Your Name" required>

            <input type="email" name="Email" placeholder="Your Email" required>

            <input type="text" name="Subject" placeholder="Subject" required>

            <textarea name="Message" rows="6" placeholder="Type your message here..." required></textarea>

            <button type="submit" class="btn-primary">
              Send Message
            </button>

            <input type="hidden" name="_next"
              value="https://garvitasachdeva27-gif.github.io/AI-INTERN/contact.html?success=true">

          </form>

        </div>
      </div>

      <div class="flex-1 flex-center">
        <img src="images/india-map.png" alt="India Map" class="map-img home-map">
      </div>

    </div>
  </section>


    <!-- Footer -->
    <footer class="footer">
        © 2026 AI Intern 
    </footer>
</body>

</html>
